<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Network Visualizer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="canvas-container"></div>

    <header id="site-header">
      <span class="site-title">Neural Network Visualizer</span>
      <a href="https://github.com/andrewsuh98/nn-visualizer" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
      <button id="theme-toggle" aria-label="Toggle light/dark mode">
        <svg id="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
    </header>

    <div id="controls">
      <div id="model-picker">
        <label>Model:</label>
        <div id="model-buttons">
          <button class="active" data-model="mlp">MLP</button>
          <button data-model="cnn">CNN</button>
        </div>
      </div>

      <div id="draw-section">
        <label>Draw a Digit:</label>
        <canvas id="draw-canvas" width="200" height="200"></canvas>
        <div id="draw-buttons">
          <button id="clear-btn">Clear</button>
          <button id="replay-btn" disabled>Replay</button>
        </div>
      </div>

      <div id="result" class="hidden">
        <span id="result-text"></span>
      </div>
    </div>

    <div id="legend">
      <h3>Legend</h3>

      <div class="legend-section">
        <span class="legend-label">Neuron Activation</span>
        <div class="legend-gradient" id="activation-gradient"></div>
        <div class="legend-range">
          <span>Inactive</span>
          <span>Max</span>
        </div>
      </div>

      <div class="legend-section">
        <span class="legend-label">Input Pixels</span>
        <div class="legend-gradient" id="pixel-gradient"></div>
        <div class="legend-range">
          <span>0 (black)</span>
          <span>1 (white)</span>
        </div>
      </div>

      <div class="legend-section">
        <span class="legend-label">Connections</span>
        <div class="legend-item">
          <span class="legend-swatch" style="background: rgb(50, 75, 255);"></span>
          <span>Positive weight</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch" style="background: rgb(255, 50, 50);"></span>
          <span>Negative weight</span>
        </div>
        <div class="legend-note">Brightness = magnitude</div>
      </div>

      <div class="legend-section">
        <span class="legend-label">Layers</span>
        <div id="legend-layers"></div>
      </div>
    </div>

    <footer id="site-footer">
      Built by <a href="https://andrewsuh.ai" target="_blank" rel="noopener noreferrer">Andrew Suh</a>
    </footer>

    <button id="reset-camera" class="hidden" aria-label="Reset camera">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </button>

    <div id="neuron-tooltip" class="hidden"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
