<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Network Visualizer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="canvas-container"></div>

    <div id="controls">
      <h2>MNIST Neural Network</h2>

      <div id="digit-picker">
        <label>Select Digit:</label>
        <div id="digit-buttons"></div>
      </div>

      <div id="sample-strip">
        <label>Samples:</label>
        <div id="sample-thumbnails"></div>
      </div>

      <button id="run-btn" disabled>Run Inference</button>

      <div id="result" class="hidden">
        <span id="result-text"></span>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
