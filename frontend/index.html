<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Network Visualizer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="canvas-container"></div>

    <header id="site-header">
      <span class="site-title">Neural Network Visualizer</span>
      <a href="https://github.com/andrewsuh98/nn-visualizer" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </header>

    <div id="controls">
      <div id="model-picker">
        <label>Model:</label>
        <div id="model-buttons">
          <button class="active" data-model="mlp">MLP</button>
          <button data-model="cnn">CNN</button>
        </div>
      </div>

      <div id="digit-picker">
        <label>Select Digit:</label>
        <div id="digit-buttons"></div>
      </div>

      <div id="sample-strip">
        <label>Samples:</label>
        <div id="sample-thumbnails"></div>
      </div>

      <button id="run-btn" disabled>Run Inference</button>

      <div id="result" class="hidden">
        <span id="result-text"></span>
      </div>
    </div>

    <div id="legend">
      <h3>Legend</h3>

      <div class="legend-section">
        <span class="legend-label">Neuron Activation</span>
        <div class="legend-gradient" id="activation-gradient"></div>
        <div class="legend-range">
          <span>Inactive</span>
          <span>Max</span>
        </div>
      </div>

      <div class="legend-section">
        <span class="legend-label">Input Pixels</span>
        <div class="legend-gradient" id="pixel-gradient"></div>
        <div class="legend-range">
          <span>0 (black)</span>
          <span>1 (white)</span>
        </div>
      </div>

      <div class="legend-section">
        <span class="legend-label">Connections</span>
        <div class="legend-item">
          <span class="legend-swatch" style="background: rgb(50, 75, 255);"></span>
          <span>Positive weight</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch" style="background: rgb(255, 50, 50);"></span>
          <span>Negative weight</span>
        </div>
        <div class="legend-note">Brightness = magnitude</div>
      </div>

      <div class="legend-section">
        <span class="legend-label">Layers</span>
        <div id="legend-layers"></div>
      </div>
    </div>

    <footer id="site-footer">
      Built by <a href="https://andrewsuh.ai" target="_blank" rel="noopener noreferrer">Andrew Suh</a>
    </footer>

    <div id="neuron-tooltip" class="hidden"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
